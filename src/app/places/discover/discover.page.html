<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Discover Places</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid class="ion-padding">
    <ion-row >
      <ion-col size="12" size-md="3" offset-md="0" *ngFor="let place of loadedPlaces">
        <ion-card >
          <img class="card-image" [src]="place.imageUrl" alt="{{ place.title }}" />
          <ion-card-header>
            <ion-card-title>{{ place.title }}</ion-card-title>
            <ion-card-subtitle>{{ place.description }}</ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            <p>Price: {{ place.price | currency}}</p>
          </ion-card-content>
        <ion-button fill="clear" color="primary" (click)="clicked(place)" [routerLink]="[place.id ]">
          View Details
        </ion-button>
         
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
